name: Obstracts Feed Sync

on:
  schedule:
    # Run every day at 8 AM UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      filter:
        description: 'Filter specific feeds (space-separated stems, e.g., "specterops expel")'
        required: false
        type: string
      include:
        description: 'Include categories (space-separated, e.g., "main issues")'
        required: false
        default: 'main'
        type: string

jobs:
  # Job to dynamically discover all feed configs
  discover-feeds:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Discover feed configs
        id: set-matrix
        run: |
          # Build command with optional filters
          CMD="python obstracts/discover_feeds.py"

          INCLUDE="main"
          
          # Add category filter if specified
          if [ -n "${{ inputs.include }}" ]; then
            INCLUDE="${{ inputs.include }}"
          fi

          CMD="$CMD --include $INCLUDE"
          
          # Add feed filter if specified
          if [ -n "${{ inputs.filter }}" ]; then
            CMD="$CMD --filter ${{ inputs.filter }}"
          fi
          
          # Generate matrix
          MATRIX=$($CMD)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          
          $CMD --markdown > $GITHUB_STEP_SUMMARY


  sync-feeds:
    runs-on: ubuntu-latest
    environment: "github-action"
    name: Sync Feeds for `${{ matrix.name }}`
    needs: discover-feeds
    strategy:
      max-parallel: 2
      matrix: ${{ fromJson(needs.discover-feeds.outputs.matrix) }}
    concurrency:
      group: ${{ matrix.config_path }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Obstracts sync
        env:
          OBSTRACTS_API_BASE_URL: ${{ secrets.OBSTRACTS_API_BASE_URL }}
          OBSTRACTS_API_KEY: ${{ secrets.OBSTRACTS_API_KEY }}
          POSTS_PER_JOB: 64
        run: |
          python obstracts_sync.py ${{ matrix.config_path }} --posts-per-job $POSTS_PER_JOB
